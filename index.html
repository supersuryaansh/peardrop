<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      --title-bar-height: 42px;
      padding-top: var(--title-bar-height);
      background: #1e1f26;
      color: #fff;
      font-family: system-ui, sans-serif;
      margin: 0;
    }

    #bar {
      background: rgba(55, 60, 72, 0.6);
      backdrop-filter: blur(64px);
      -webkit-app-region: drag;
      height: var(--title-bar-height);
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
      z-index: 2;
      color: #fff;
      padding-left: 12px;
      line-height: var(--title-bar-height);
      font-size: 13px;
      opacity: 0.8;
    }

    #tabs {
      display: flex;
      margin: 20px auto;
      width: max-content;
      gap: 10px;
    }

    #tabs button {
      padding: 8px 18px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-weight: 600;
      transition: 0.2s ease;
    }
    #tabs button.active {
      background: #b6ff39;
      color: #000;
    }

    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* DROP ZONE */
    #drop-zone {
      margin: 24px auto;
      width: 90%;
      max-width: 600px;
      height: 70vh;
      border: 2px dashed rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      color: #aaa;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      position: relative;
      padding: 24px;
      box-sizing: border-box;
    }

    #drop-zone.dragover {
      border-color: #b6ff39;
      color: #b6ff39;
    }

    #drop-zone > div:first-child {
      margin-top: 16px;
      font-size: 16px;
    }

    #file-list {
      margin-top: 20px;
      width: 100%;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 8px;
    }

    /* Custom scrollbar */
    #file-list::-webkit-scrollbar {
      width: 6px;
    }
    #file-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }
    #file-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.05);
      padding: 8px 12px;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
    }
    .file-item button {
      background: none;
      border: none;
      color: #b6ff39;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }

    /* QR container inside drop zone */
    #qr-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
    }

    #qr-container canvas {
      background: #fff;
      border-radius: 12px;
      width: 160px;
      height: 160px;
    }

    #chooser {
      margin-top: 16px;
      display: flex;
      gap: 12px;
    }

    #chooser button {
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s ease;
    }

    #pick-files,
    #pick-folder {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #send-files {
      background: #b6ff39;
      color: #000;
    }

    #pick-files:hover,
    #pick-folder:hover {
      background: rgba(255,255,255,0.15);
    }

    #send-files:hover {
      background: #c6ff5a;
    }

    /* RECEIVE TAB */
    #receive-tab {
      margin: 40px auto;
      width: 400px;
      text-align: center;
    }
    #phrase-input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-bottom: 12px;
      font-size: 16px;
    }
    #start-receive {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #b6ff39;
      color: #000;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
  <script type="module" src="./app.js"></script>
</head>
<body>
  <div id="bar">Hostname</div>

  <div id="tabs">
    <button id="receive-tab-btn">Receive</button>
    <button id="send-tab-btn" class="active">Send</button>
  </div>

  <div id="send-tab" class="tab-content active">
    <div id="drop-zone">
      <input type="file" id="file-input" multiple hidden/>
      <input type="file" id="dir-input" webkitdirectory hidden/>
      <div>Drop the file here or browse through your folders</div>

      <div id="file-list"></div>
      <div id="qr-container"></div>

      <div id="chooser">
        <button id="pick-files">Select Files</button>
        <button id="pick-folder">Browse Folder</button>
        <button id="send-files">Send</button>
      </div>
    </div>
  </div>

  <div id="receive-tab" class="tab-content">
    <input id="phrase-input" placeholder="Enter phrase code" />
    <button id="start-receive">Start Receiving</button>
    <pre id="receive-log"></pre>
  </div>
</body>
</html>
