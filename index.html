 <!DOCTYPE html>
<html>
<head>
  <style>
    body {
      --title-bar-height: 42px;
      padding-top: var(--title-bar-height);
      background: #1e1f26;
      color: #fff;
      font-family: system-ui, sans-serif;
    }

    #bar {
      background: rgba(55, 60, 72, 0.6);
      backdrop-filter: blur(64px);
      -webkit-app-region: drag;
      height: var(--title-bar-height);
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
      z-index: 2;
      color: #fff;
    }

    /* Tabs */
    #tabs {
      display: flex;
      margin: 20px auto;
      width: max-content;
      gap: 16px;
    }
    #tabs button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-weight: bold;
    }
    #tabs button.active {
      background: #3399ff;
    }

    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* Drop zone same as before */
    #drop-zone {
      margin: 24px auto;
      width: 90%;
      max-width: 600px;
      height: 70vh;
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      color: #aaa;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    #chooser {
      position: absolute;
      bottom: 12px;
      display: flex;
      gap: 12px;
      font-size: 13px;
      color: #66aaff;
    }

    #chooser button {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: #fff;
    }

    #chooser button:hover {
      background: rgba(255,255,255,0.15);
    }

    /* Receive tab */
    #receive-tab {
      margin: 40px auto;
      width: 400px;
      text-align: center;
    }
    #phrase-input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-bottom: 12px;
      font-size: 16px;
    }
    #start-receive {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #3399ff;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
  <script type="module" src="./app.js"></script>
</head>
<body>
  <div id="bar"><pear-ctrl></pear-ctrl></div>

  <div id="tabs">
    <button id="send-tab-btn" class="active">Send</button>
    <button id="receive-tab-btn">Receive</button>
  </div>

  <div id="send-tab" class="tab-content active">
    <div id="drop-zone">
      <input type="file" id="file-input" multiple hidden/>
      <input type="file" id="dir-input" webkitdirectory hidden/>
      <div>📂 Drag & Drop files or folders here</div>
      <span>or use the chooser below</span>
      <div id="chooser">
        <button id="pick-files">Select Files</button>
        <button id="pick-folder">Select Folder</button>
      </div>
    </div>
  </div>

  <div id="receive-tab" class="tab-content">
    <input id="phrase-input" placeholder="Enter phrase code" />
    <button id="start-receive">Start Receiving</button>
    <pre id="receive-log"></pre>
  </div>
</body>
</html>
